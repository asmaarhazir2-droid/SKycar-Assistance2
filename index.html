<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sky Car Assistance | Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero-road" aria-hidden="true">
        <div class="road-line"></div>
        <div id="carAnim" class="car-wrap">
          <div class="car-body">
            <div class="car-window"></div>
            <div class="car-face">
              <span id="carBrowLeft" class="car-brow left"></span>
              <span id="carBrowRight" class="car-brow right"></span>
              <span id="carEyeLeft" class="car-eye"></span>
              <span id="carEyeRight" class="car-eye"></span>
              <span id="carMouth" class="car-mouth"></span>
            </div>
          </div>
          <span class="wheel wheel-left"></span>
          <span class="wheel wheel-right"></span>
        </div>
      </section>

      <section class="card" aria-labelledby="login-title">
        <h1 id="login-title">Connexion</h1>
        <p class="subtitle" id="subtitle">Accède à ton espace Sky Car Assistance</p>
        <p class="subtitle" id="storageStatus" aria-live="polite"></p>

        <div class="switch" role="tablist" aria-label="Choisir une action">
          <button id="tabLogin" class="switch-btn active" type="button" role="tab" aria-selected="true">
            <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i> Connexion
          </button>
          <button id="tabSignup" class="switch-btn" type="button" role="tab" aria-selected="false">
            <i class="bi bi-person-plus" aria-hidden="true"></i> Créer un compte
          </button>
        </div>

        <form id="loginForm" novalidate>
          <div class="field">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="exemple@skycar.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="field">
            <label for="password">Mot de passe</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              minlength="6"
              autocomplete="current-password"
            />
          </div>

          <button type="submit"><i class="bi bi-box-arrow-in-right" aria-hidden="true"></i> Se connecter</button>
          <button id="forgotPasswordLink" class="text-btn" type="button"><i class="bi bi-key" aria-hidden="true"></i> Mot de passe oublié ?</button>
          <p id="loginMessage" role="status" aria-live="polite"></p>
        </form>

        <form id="forgotForm" class="hidden" novalidate>
          <div class="field">
            <label for="forgotEmail">Email du compte</label>
            <input
              type="email"
              id="forgotEmail"
              name="forgotEmail"
              placeholder="exemple@skycar.com"
              required
              autocomplete="email"
            />
          </div>

          <button id="sendResetCode" type="button"><i class="bi bi-envelope-arrow-up" aria-hidden="true"></i> Envoyer le lien</button>
          <button id="backToLogin" class="text-btn" type="button"><i class="bi bi-arrow-left" aria-hidden="true"></i> Retour à la connexion</button>
          <p id="forgotMessage" role="status" aria-live="polite"></p>
        </form>

        <form id="signupForm" class="hidden" novalidate>
          <div class="field">
            <label for="fullName">Nom complet</label>
            <input
              type="text"
              id="fullName"
              name="fullName"
              placeholder="Ton nom"
              required
              autocomplete="name"
            />
          </div>

          <div class="field">
            <label for="signupEmail">Email</label>
            <input
              type="email"
              id="signupEmail"
              name="signupEmail"
              placeholder="exemple@skycar.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="field">
            <label for="signupPassword">Mot de passe</label>
            <input
              type="password"
              id="signupPassword"
              name="signupPassword"
              placeholder="••••••••"
              required
              minlength="6"
              autocomplete="new-password"
            />
          </div>

          <div class="field">
            <label for="confirmPassword">Confirmer le mot de passe</label>
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="••••••••"
              required
              minlength="6"
              autocomplete="new-password"
            />
          </div>

          <label class="check-row" for="autoLoginAfterSignup">
            <input type="checkbox" id="autoLoginAfterSignup" name="autoLoginAfterSignup" />
            <span>Se connecter automatiquement après création</span>
          </label>

          <button type="submit"><i class="bi bi-person-plus" aria-hidden="true"></i> Créer mon compte</button>
          <p id="signupMessage" role="status" aria-live="polite"></p>
        </form>

      </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="firebase-config.js"></script>
    <script src="cloud-sync.js"></script>
    <script src="gsap-site.js"></script>
    <script src="script.js"></script>
  </body>
</html>
